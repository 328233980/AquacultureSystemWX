# ============================================
# 水产养殖管理系统 - Docker Compose 配置
# 包含应用服务和 MySQL 数据库
# ============================================

version: '3.8'

services:
  # MySQL 数据库服务
  mysql:
    image: mysql:8.0
    container_name: aquaculture-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-aquaculture123}
      MYSQL_DATABASE: ${DB_NAME:-aquaculture}
      MYSQL_USER: ${DB_USERNAME:-aquaculture}
      MYSQL_PASSWORD: ${DB_PASSWORD:-aquaculture123}
      TZ: Asia/Shanghai
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d:ro
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-aquaculture123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aquaculture-network

  # 后端应用服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aquaculture-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # 数据库配置
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-aquaculture}
      DB_USERNAME: ${DB_USERNAME:-aquaculture}
      DB_PASSWORD: ${DB_PASSWORD:-aquaculture123}
      # 测试模式（生产环境设为 false）
      TEST_MODE: ${TEST_MODE:-false}
      # JWT 配置
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-key-change-in-production}
      # 微信小程序配置
      WX_APPID: ${WX_APPID:-}
      WX_SECRET: ${WX_SECRET:-}
      # JVM 参数
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - aquaculture-network

# 数据卷
volumes:
  mysql_data:
    driver: local

# 网络
networks:
  aquaculture-network:
    driver: bridge
