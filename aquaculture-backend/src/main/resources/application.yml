server:
  port: 8088

spring:
  application:
    name: aquaculture-management
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:10.7.107.30}:${DB_PORT:3306}/${DB_NAME:aquaculture}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&connectTimeout=30000&socketTimeout=60000
    username: ${DB_USERNAME:zhengzj}
    password: ${DB_PASSWORD:Aa62770212}
    # HikariCP 连接池配置 - 支持重试等待数据库就绪
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 60000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.aquaculture.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 微信小程序配置
wx:
  miniapp:
    appid: ${WX_APPID:wx6866b82ead3e3261}
    secret: ${WX_SECRET:3ec43831a5c10f003b9809d377aa6d69}

# JWT配置
jwt:
  secret: ${JWT_SECRET:aquaculture-jwt-secret-key-2024}
  expiration: 604800000  # 7天（毫秒）

# 测试配置
test:
  mode: ${TEST_MODE:false}
  default-token: ${TEST_DEFAULT_TOKEN:888888}

# 文件上传配置
file:
  upload-path: static/uploads/
  max-size: 5242880  # 5MB

logging:
  level:
    com.aquaculture: DEBUG
    org.springframework.web: INFO
