server:
  port: 8088

spring:
  application:
    name: aquaculture-management
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:data/aquaculture.db
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.aquaculture.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 微信小程序配置
wx:
  miniapp:
    appid: ${WX_APPID:wx6866b82ead3e3261}
    secret: ${WX_SECRET:3ec43831a5c10f003b9809d377aa6d69}

# JWT配置
jwt:
  secret: ${JWT_SECRET:aquaculture-jwt-secret-key-2024}
  expiration: 604800000  # 7天（毫秒）

# 测试配置
test:
  mode: ${TEST_MODE:true}
  default-token: ${TEST_DEFAULT_TOKEN:888888}

# 文件上传配置
file:
  upload-path: static/uploads/
  max-size: 5242880  # 5MB

logging:
  level:
    com.aquaculture: DEBUG
    org.springframework.web: INFO
